version: "3.9"

secrets:
  jwt_secret:
    file: ./secrets/jwt_secret.txt
  worker_secret:
    file: ./secrets/worker_secret.txt
  anthropic_api_key:
    file: ./secrets/anthropic_api_key.txt

services:
  web:
    build: ./apps
    container_name: neutrino-nginx-web
    depends_on:
      - docs
      - sheets
      - slides
      - photos
    ports:
      - 8880:8080
    volumes:
      - ./apps/neutrino-proxy.conf:/etc/nginx/conf.d/default.conf:ro
      
  auth:
    build: 
      context: ./backend
      dockerfile: Dockerfile
      args:
        SERVICE: auth
    container_name: neutrino-auth-service
    secrets:
      - jwt_secret
    environment:
      JWT_SECRET: /run/secrets/jwt_secret
      JWT_ACCESS_EXPIRY_SECS: 900
      JWT_REFRESH_EXPIRY_SECS: 604800
      AUTH_DATABASE_URL: /usr/local/data/auth.db
      AUTH_PORT: 8080
      LOG_PATH: /usr/local/logs/
      LOG_LEVEL: debug    
    volumes:
      - ./logs/auth:/usr/local/logs
      - ./data/auth:/usr/local/data

  drive:
    build: 
      context: ./backend
      dockerfile: Dockerfile
      args:
        SERVICE: drive
    container_name: neutrino-drive-service
    depends_on:
      - auth
    secrets:
      - jwt_secret
      - worker_secret
    environment:
      JWT_SECRET: /run/secrets/jwt_secret
      WORKER_SECRET: /run/secrets/worker_secret
      JWT_ACCESS_EXPIRY_SECS: 900
      JWT_REFRESH_EXPIRY_SECS: 604800
      LOG_LEVEL: debug
      AUTH_URL: http://auth:8080
      DRIVE_DATABASE_URL: /usr/local/data/drive.db
      DRIVE_PORT: 8080
      STORAGE_PATH: /usr/local/data/storage
      LOG_PATH: /usr/local/logs/
    volumes:
      - ./logs/drive:/usr/local/logs
      - ./data/drive:/usr/local/data

  docs:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        SERVICE: docs
    container_name: neutrino-docs-service
    depends_on:
      - drive
    secrets:
      - jwt_secret
      - worker_secret
    environment:
      JWT_SECRET: /run/secrets/jwt_secret
      WORKER_SECRET: /run/secrets/worker_secret
      JWT_ACCESS_EXPIRY_SECS: 900
      JWT_REFRESH_EXPIRY_SECS: 604800
      LOG_LEVEL: debug
      AUTH_URL: http://auth:8080
      DOCS_DATABASE_URL: /usr/local/data/docs.db
      DOCS_PORT: 8080
      LOG_PATH: /usr/local/logs/
    volumes:
      - ./logs/docs:/usr/local/logs
      - ./data/drive:/usr/local/data

  sheets:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        SERVICE: sheets
    container_name: neutrino-sheets-service
    depends_on:
      - drive
    secrets:
      - jwt_secret
      - worker_secret
    environment:
      JWT_SECRET: /run/secrets/jwt_secret
      WORKER_SECRET: /run/secrets/worker_secret
      ANTHROPIC_API_KEY: /run/secrets/anthropic_api_key
      JWT_ACCESS_EXPIRY_SECS: 900
      JWT_REFRESH_EXPIRY_SECS: 604800
      LOG_LEVEL: debug
      AUTH_URL: http://auth:8080
      SHEETS_DATABASE_URL: /usr/local/data/sheets.db
      SHEETS_PORT: 8080
      LOG_PATH: /usr/local/logs/
    volumes:
      - ./logs/sheets:/usr/local/logs
      - ./data/drive:/usr/local/data

  slides:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        SERVICE: slides
    container_name: neutrino-slides-service
    depends_on:
      - drive
    secrets:
      - jwt_secret
      - worker_secret
    environment:
      JWT_SECRET: /run/secrets/jwt_secret
      WORKER_SECRET: /run/secrets/worker_secret
      ANTHROPIC_API_KEY: /run/secrets/anthropic_api_key
      JWT_ACCESS_EXPIRY_SECS: 900
      JWT_REFRESH_EXPIRY_SECS: 604800
      LOG_LEVEL: debug
      AUTH_URL: http://auth:8080
      SLIDES_DATABASE_URL: /usr/local/data/slides.db
      SLIDES_PORT: 8080
      LOG_PATH: /usr/local/logs/
    volumes:
      - ./logs/slides:/usr/local/logs
      - ./data/drive:/usr/local/data

  photos:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        SERVICE: photos
    container_name: neutrino-photos-service
    depends_on:
      - drive
    secrets:
      - jwt_secret
      - worker_secret
    environment:
      JWT_SECRET: /run/secrets/jwt_secret
      WORKER_SECRET: /run/secrets/worker_secret
      JWT_ACCESS_EXPIRY_SECS: 900
      JWT_REFRESH_EXPIRY_SECS: 604800
      LOG_LEVEL: debug
      AUTH_URL: http://auth:8080
      PHOTOS_DATABASE_URL: /usr/local/data/photos.db
      PHOTOS_PORT: 8080
      LOG_PATH: /usr/local/logs/
    volumes:
      - ./logs/photos:/usr/local/logs
      - ./data/drive:/usr/local/data

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        SERVICE: worker
    container_name: neutrino-worker
    depends_on:
      - drive
    secrets:
      - jwt_secret
      - worker_secret
    environment:
      JWT_SECRET: /run/secrets/jwt_secret
      WORKER_SECRET: /run/secrets/worker_secret
      LOG_LEVEL: debug
      AUTH_URL: http://auth:8080
      PHOTO_URL: http://photos:8080
      DRIVE_URL: http://drive:8080
      WORKER_DATABASE_URL: /usr/local/data/workers.db
      WORKER_PORT: 8080
      LOG_PATH: /usr/local/logs/
      FACE_DETECT_MODEL_PATH: /usr/local/models/det_10g.onnx
      FACE_RECOGNITION_MODEL_PATH: /usr/local/models/w600k_r50.onnx
    volumes:
      - ./logs/photos:/usr/local/logs
      - ./data/drive:/usr/local/data
      - ./data/models:/usr/local/models
