version: "3.9"

networks:
  neutrino-net:
    driver: bridge

services:
  web:
    image:  ghcr.io/wcherry/neutrino.app/web:latest
    extra_hosts:
       - "host.docker.internal:host-gateway"
    container_name: neutrino-nginx-proxy
    networks:
      - neutrino-net
    ports:
      - "9080:8080"
    volumes:
      - ./neutrino-proxy.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

  auth:
    image:  ghcr.io/wcherry/neutrino.app/auth:latest
    container_name: neutrino-auth-service
    networks:
      - neutrino-net
    environment:
      JWT_SECRET: your-secret-key-here-change-in-production
      JWT_ACCESS_EXPIRY_SECS: 900
      JWT_REFRESH_EXPIRY_SECS: 604800
      AUTH_DATABASE_URL: /usr/local/data/auth.db
      AUTH_PORT: 8080
      LOG_PATH: /usr/local/logs/
      LOG_LEVEL: debug    
    volumes:
      - ./logs/auth:/usr/local/logs
      - ./data/auth:/usr/local/data
    restart: unless-stopped

  drive:
    image:  ghcr.io/wcherry/neutrino.app/drive:latest
    container_name: neutrino-drive-service
    networks:
      - neutrino-net
    environment:
      JWT_SECRET: your-secret-key-here-change-in-production
      JWT_ACCESS_EXPIRY_SECS: 900
      JWT_REFRESH_EXPIRY_SECS: 604800
      LOG_LEVEL: debug
      AUTH_URL: http://auth:8080/
      DRIVE_DATABASE_URL: /usr/local/data/drive.db
      DRIVE_PORT: 8080
      STORAGE_PATH: /usr/local/data/storage
      LOG_PATH: /usr/local/logs/
    volumes:
      - ./logs/drive:/usr/local/logs
      - ./data/drive:/usr/local/data
    restart: unless-stopped

  docs:
    image: ghcr.io/wcherry/neutrino.app/docs:latest
    container_name: neutrino-docs-service
    networks:
      - neutrino-net
    environment:
      JWT_SECRET: your-secret-key-here-change-in-production
      JWT_ACCESS_EXPIRY_SECS: 900
      JWT_REFRESH_EXPIRY_SECS: 604800
      LOG_LEVEL: debug
      AUTH_URL: http://auth:8080/
      DOCS_DATABASE_URL: /usr/local/data/drive.db
      DOCS_PORT: 8080
      LOG_PATH: /usr/local/logs/
    volumes:
      - ./logs/docs:/usr/local/logs
      - ./data/drive:/usr/local/data
    restart: unless-stopped

  sheets:
    image: ghcr.io/wcherry/neutrino.app/sheets:latest
    container_name: neutrino-sheets-service
    networks:
      - neutrino-net
    environment:
      JWT_SECRET: your-secret-key-here-change-in-production
      JWT_ACCESS_EXPIRY_SECS: 900
      JWT_REFRESH_EXPIRY_SECS: 604800
      LOG_LEVEL: debug
      AUTH_URL: http://auth:8080/
      SHEETS_DATABASE_URL: /usr/local/data/drive.db
      SHEETS_PORT: 8080
      DRIVE_URL: http://drive:8080/
      LOG_PATH: /usr/local/logs/
    volumes:
      - ./logs/sheets:/usr/local/logs
      - ./data/drive:/usr/local/data
    restart: unless-stopped

  slides:
    image: ghcr.io/wcherry/neutrino.app/slides:latest
    container_name: neutrino-slides-service
    networks:
      - neutrino-net
    environment:
      JWT_SECRET: your-secret-key-here-change-in-production
      JWT_ACCESS_EXPIRY_SECS: 900
      JWT_REFRESH_EXPIRY_SECS: 604800
      LOG_LEVEL: debug
      AUTH_URL: http://auth:8080/
      SLIDES_DATABASE_URL: /usr/local/data/drive.db
      SLIDES_PORT: 8080
      DRIVE_URL: http://drive:8080/
      LOG_PATH: /usr/local/logs/
    volumes:
      - ./logs/slides:/usr/local/logs
      - ./data/drive:/usr/local/data
    restart: unless-stopped

  worker:
    container_name: neutrino-worker
    image: ghcr.io/wcherry/neutrino.app/worker:latest
    networks:
      - neutrino-net
