version: "3.9"

services:

  nginx-proxy:
    image: nginx:1.27-alpine
    container_name: neutrino-nginx-proxy
    ports:
      - "8880:8080"
    volumes:
      - ./nginx/neutrino-proxy.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

  auth:
    image: ghcr.io/org/repo/auth:latest
    container_name: neutrino-auth-service
    ports:
      - "8881:8080"

  drive:
    image: ghcr.io/org/repo/drive:latest
    container_name: neutrino-drive-service
    ports:
      - "8882:8080"

  worker:
    container_name: neutrino-worker
    image: ghcr.io/org/repo/worker:latest